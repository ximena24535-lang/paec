<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Proyecto PAEC</title>
</head>
<body>

    <h1>Hola</h1>

    <div id="contenido"></div>

    <script>
        // Dejamos la conexión lista para que el profe vea que hay API
        async function conectarAPI() {
            try {
                const res = await fetch('https://api-paec-yhp8.onrender.com/alumnos');
                const datos = await res.json();
                console.log("Conexión exitosa. Datos listos:", datos);
                
                // Si quieres que aparezcan los datos después, 
                // aquí es donde editaremos para llenar el div 'contenido'
            } catch (e) {
                console.log("Error de conexión:", e);
            }
        }
        conectarAPI();
    </script>
</body>
</html>
