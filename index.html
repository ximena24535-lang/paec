<!DOCTYPE html>
<html>
<head>
    <title>Entrega Final</title>
</head>
<body>
    <h1 id="mensaje">Cargando...</h1>

    <script>
        async function conectarTodo() {
            try {
                // 1. GitHub Pages llama a Render
                const respuesta = await fetch('https://api-paec-yhp8.onrender.com/');
                const texto = await respuesta.text();
                
                // 2. Ponemos el "Hola" que mandó el servidor
                document.getElementById('mensaje').innerText = texto;
            } catch (error) {
                document.getElementById('mensaje').innerText = "Error de conexión";
            }
        }
        conectarTodo();
    </script>
</body>
</html>
